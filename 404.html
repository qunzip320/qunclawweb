<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>页面不存在 — Qun-OpenClaw</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .notfound {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .notfound-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      color: #e8e8ed;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .notfound h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 0.75rem;
    }
    .notfound p {
      color: #6e6e73;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Qun-龙虾应用案例</a>
    </div>
  </header>

  <main class="notfound">
    <div class="notfound-code" aria-hidden="true">404</div>
    <h1>页面不存在</h1>
    <p>你访问的案例页面不存在或已被移除。</p>
    <a href="/" class="btn-primary">返回首页</a>
  </main>
</body>
</html>
